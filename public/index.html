<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Despensa — Lista inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f5f3ef;
      --surface:    #ffffff;
      --surface2:   #f0ede8;
      --border:     #e2ddd6;
      --border-strong: #cbc5bb;
      --accent:     #d97706;
      --accent-bg:  #fef3c7;
      --accent2:    #059669;
      --accent2-bg: #d1fae5;
      --accent3:    #dc4f22;
      --accent3-bg: #fee2d5;
      --text:       #1c1917;
      --text-muted: #78716c;
      --text-dim:   #a8a29e;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:  0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --radius:     16px;
      --radius-sm:  10px;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ─── Layout (mobile-first) ──────────────────── */
    .app-wrapper {
      width: 100%;
      padding: 0 16px 100px;
    }

    @media (min-width: 600px) {
      .app-wrapper { padding: 0 24px 80px; }
    }

    @media (min-width: 900px) {
      .app-wrapper { max-width: 860px; margin: 0 auto; padding: 0 32px 80px; }
    }

    /* ─── Header ─────────────────────────────────── */
    header {
      padding: 28px 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    @media (min-width: 600px) {
      header { padding: 40px 0 28px; margin-bottom: 28px; }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    @media (min-width: 600px) {
      .logo { font-size: 2rem; }
    }

    .logo span { color: var(--accent); }

    .header-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ─── Tabs ────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      padding: 4px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    @media (min-width: 600px) {
      .tabs { margin-bottom: 28px; }
    }

    .tab-btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      letter-spacing: 0.03em;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    @media (min-width: 400px) {
      .tab-btn { padding: 10px 16px; font-size: 0.85rem; gap: 8px; }
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }

    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-icon { font-size: 1rem; }

    /* ─── Panel ───────────────────────────────────── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ─── Add item row ────────────────────────────── */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    @media (min-width: 500px) {
      .add-row { gap: 10px; margin-bottom: 24px; }
    }

    .add-input {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow-sm);
      -webkit-appearance: none;
    }

    .add-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(217,119,6,0.12);
    }

    .add-input::placeholder { color: var(--text-dim); }

    .qty-input {
      width: 62px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow-sm);
      -webkit-appearance: none;
    }

    @media (min-width: 500px) {
      .qty-input { width: 72px; }
    }

    .qty-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(217,119,6,0.12);
    }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      white-space: nowrap;
      box-shadow: var(--shadow-sm);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    @media (min-width: 500px) {
      .add-btn { padding: 13px 20px; }
    }

    .add-btn:hover { background: #b45309; box-shadow: var(--shadow-md); }
    .add-btn:active { transform: scale(0.97); }

    /* ─── Section label ───────────────────────────── */
    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* ─── Item list ───────────────────────────────── */
    .item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 24px;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      transition: border-color 0.2s, opacity 0.25s, box-shadow 0.2s;
      animation: slideIn 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    @media (min-width: 500px) {
      .item-row { gap: 12px; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-row.done {
      opacity: 0.5;
      border-color: var(--border);
      box-shadow: none;
    }

    .item-row.done .item-name { text-decoration: line-through; color: var(--text-muted); }

    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border-strong);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 0.7rem;
      color: transparent;
      -webkit-tap-highlight-color: transparent;
    }

    .check-btn:hover { border-color: var(--accent2); background: var(--accent2-bg); }

    .item-row.done .check-btn {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff;
    }

    /* Gastado button */
    .spent-btn {
      background: var(--accent3-bg);
      border: 1px solid rgba(220,79,34,0.25);
      color: var(--accent3);
      font-size: 0.68rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 4px 9px;
      border-radius: 99px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .spent-btn:hover { background: var(--accent3); color: #fff; border-color: var(--accent3); }

    .item-name {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 400;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-qty {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.85rem;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .delete-btn:hover { color: var(--accent3); background: var(--accent3-bg); }

    .empty-state {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.88rem;
      padding: 32px 0;
    }

    /* ─── Stats bar ───────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 5px 13px;
      font-size: 0.78rem;
      color: var(--text-muted);
      box-shadow: var(--shadow-sm);
    }

    .stat-pill strong { color: var(--text); font-weight: 600; }

    /* ─── Progress bar ────────────────────────────── */
    .progress-bar-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), #34d399);
      border-radius: 99px;
      transition: width 0.45s cubic-bezier(.4,0,.2,1);
    }

    /* ─── Fridge grid ─────────────────────────────── */
    .fridge-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (min-width: 600px) {
      .fridge-grid { flex-direction: row; gap: 20px; }
      .fridge-grid > * { flex: 1; }
    }

    .fridge-section {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }

    @media (min-width: 600px) {
      .fridge-section { padding: 20px; }
    }

    .fridge-section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.92rem;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text);
    }

    .fridge-add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .fridge-add-row .add-input { font-size: 0.88rem; padding: 10px 11px; }
    .fridge-add-row .qty-input { width: 54px; font-size: 0.85rem; padding: 10px 7px; }
    .fridge-add-row .add-btn { padding: 10px 13px; font-size: 0.82rem; }

    .fridge-item-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }

    .fridge-item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 11px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      border: 1px solid var(--border);
      animation: slideIn 0.2s ease;
    }

    .fridge-item-row .item-name { font-size: 0.88rem; }
    .fridge-item-row .item-qty { font-size: 0.74rem; }

    /* ─── Recipe trigger ──────────────────────────── */
    .recipe-trigger-area {
      border-top: 1.5px solid var(--border);
      padding-top: 20px;
    }

    @media (min-width: 600px) {
      .recipe-trigger-area { padding-top: 24px; }
    }

    .recipe-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, #b45309 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 15px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(217,119,6,0.3);
      -webkit-tap-highlight-color: transparent;
    }

    @media (min-width: 600px) {
      .recipe-btn { padding: 15px 24px; font-size: 1rem; }
    }

    .recipe-btn:hover { opacity: 0.9; box-shadow: 0 4px 16px rgba(217,119,6,0.35); }
    .recipe-btn:active { transform: scale(0.99); }
    .recipe-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    /* ─── Recipes output ──────────────────────────── */
    .recipes-output { margin-top: 20px; }

    .recipes-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 14px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (min-width: 600px) {
      .recipes-title { font-size: 1.1rem; }
    }

    .recipe-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (min-width: 600px) {
      .recipe-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    }

    .recipe-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      animation: slideIn 0.3s ease both;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    @media (min-width: 600px) {
      .recipe-card { padding: 18px; }
    }

    .recipe-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); }
    .recipe-card:nth-child(2) { animation-delay: 0.06s; }
    .recipe-card:nth-child(3) { animation-delay: 0.12s; }
    .recipe-card:nth-child(4) { animation-delay: 0.18s; }

    .recipe-card-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.97rem;
      margin-bottom: 9px;
      line-height: 1.3;
      color: var(--text);
    }

    .recipe-meta {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .recipe-tag {
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 99px;
      font-weight: 600;
    }

    .tag-time   { background: var(--accent-bg);  color: var(--accent);  border: 1px solid rgba(217,119,6,0.2); }
    .tag-easy   { background: var(--accent2-bg); color: var(--accent2); border: 1px solid rgba(5,150,105,0.2); }
    .tag-medium { background: #fef9c3;            color: #854d0e;        border: 1px solid rgba(133,77,14,0.2); }
    .tag-hard   { background: var(--accent3-bg); color: var(--accent3); border: 1px solid rgba(220,79,34,0.2); }

    .recipe-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .recipe-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-decoration: none;
      background: var(--accent-bg);
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid rgba(217,119,6,0.2);
      transition: background 0.15s, box-shadow 0.15s;
    }

    .recipe-link:hover {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(217,119,6,0.25);
    }

    /* ─── Loading spinner ─────────────────────────── */
    .spinner {
      display: inline-block;
      width: 17px;
      height: 17px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: #dc2626;
      font-size: 0.88rem;
      margin-top: 14px;
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- Header -->
  <header>
    <div>
      <div class="logo">Des<span>pensa</span></div>
    </div>
    <div class="header-sub">Lista inteligente</div>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('shop')">
      <span class="tab-icon">🛒</span> Compra
    </button>
    <button class="tab-btn" onclick="switchTab('fridge')">
      <span class="tab-icon">🧊</span> Inventario
    </button>
  </div>

  <!-- ── PANEL: COMPRA ─────────────────────────────── -->
  <div id="panel-shop" class="panel active">

    <div class="add-row">
      <input class="add-input" id="shop-input" type="text" placeholder="Añadir producto..." onkeydown="if(event.key==='Enter') addShopItem()" />
      <input class="qty-input" id="shop-qty" type="text" placeholder="Cant." />
      <button class="add-btn" onclick="addShopItem()">+ Añadir</button>
    </div>

    <div class="stats-bar" id="shop-stats"></div>

    <div class="progress-bar-wrap" id="shop-progress-wrap" style="display:none">
      <div class="progress-bar-fill" id="shop-progress-fill"></div>
    </div>

    <p class="section-label">Por comprar</p>
    <ul class="item-list" id="shop-list-pending"></ul>

    <p class="section-label" id="shop-done-label" style="display:none">Comprado ✓</p>
    <ul class="item-list" id="shop-list-done"></ul>

    <div class="recipe-trigger-area">
      <button class="recipe-btn" id="shop-recipe-btn" onclick="getRecipes('shop')">
        ✨ Sugerir recetas para la semana
      </button>
      <div id="shop-recipes-output" class="recipes-output"></div>
    </div>
  </div>

  <!-- ── PANEL: INVENTARIO ─────────────────────────── -->
  <div id="panel-fridge" class="panel">

    <div class="fridge-grid">
      <!-- Nevera -->
      <div class="fridge-section">
        <div class="fridge-section-title">🌡️ Nevera</div>
        <div class="fridge-add-row">
          <input class="add-input" id="fridge-input" type="text" placeholder="Producto..." onkeydown="if(event.key==='Enter') addFridgeItem('fridge')" />
          <input class="qty-input" id="fridge-qty" type="text" placeholder="Cant." />
          <button class="add-btn" onclick="addFridgeItem('fridge')">+</button>
        </div>
        <ul class="item-list fridge-item-list" id="fridge-list"></ul>
      </div>

      <!-- Congelador -->
      <div class="fridge-section">
        <div class="fridge-section-title">❄️ Congelador</div>
        <div class="fridge-add-row">
          <input class="add-input" id="freezer-input" type="text" placeholder="Producto..." onkeydown="if(event.key==='Enter') addFridgeItem('freezer')" />
          <input class="qty-input" id="freezer-qty" type="text" placeholder="Cant." />
          <button class="add-btn" onclick="addFridgeItem('freezer')">+</button>
        </div>
        <ul class="item-list fridge-item-list" id="freezer-list"></ul>
      </div>
    </div>

    <div class="recipe-trigger-area">
      <button class="recipe-btn" id="fridge-recipe-btn" onclick="getRecipes('fridge')">
        🍳 Sugerir recetas con mi inventario
      </button>
      <div id="fridge-recipes-output" class="recipes-output"></div>
    </div>
  </div>

</div>

<script>
// ─── State ─────────────────────────────────────────
const state = {
  shop: JSON.parse(localStorage.getItem('despensa_shop') || '[]'),
  fridge: JSON.parse(localStorage.getItem('despensa_fridge') || '[]'),
  freezer: JSON.parse(localStorage.getItem('despensa_freezer') || '[]'),
};

function save() {
  localStorage.setItem('despensa_shop', JSON.stringify(state.shop));
  localStorage.setItem('despensa_fridge', JSON.stringify(state.fridge));
  localStorage.setItem('despensa_freezer', JSON.stringify(state.freezer));
}

// ─── Tabs ───────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'shop') || (i === 1 && tab === 'fridge'));
  });
  document.getElementById('panel-shop').classList.toggle('active', tab === 'shop');
  document.getElementById('panel-fridge').classList.toggle('active', tab === 'fridge');
}

// ─── Shop ───────────────────────────────────────────
function addShopItem() {
  const input = document.getElementById('shop-input');
  const qty   = document.getElementById('shop-qty');
  const name  = input.value.trim();
  if (!name) return;
  state.shop.push({ id: Date.now(), name, qty: qty.value.trim() || '', status: 'pending' });
  input.value = '';
  qty.value = '';
  save();
  renderShop();
  input.focus();
}

function toggleShopItem(id) {
  const item = state.shop.find(i => i.id === id);
  if (!item) return;
  // pending -> done -> pending (cycling between two states via checkbox)
  item.status = item.status === 'done' ? 'pending' : 'done';
  save();
  renderShop();
}

function spendShopItem(id) {
  // Mark as spent -> remove from list
  state.shop = state.shop.filter(i => i.id !== id);
  save();
  renderShop();
}

function deleteShopItem(id) {
  state.shop = state.shop.filter(i => i.id !== id);
  save();
  renderShop();
}

function renderShop() {
  // Migrate old items that used done:bool
  state.shop.forEach(i => { if (i.status === undefined) i.status = i.done ? 'done' : 'pending'; });

  const pending = state.shop.filter(i => i.status === 'pending');
  const done    = state.shop.filter(i => i.status === 'done');
  const total   = state.shop.length;

  // Stats
  const stats = document.getElementById('shop-stats');
  stats.innerHTML = total
    ? `<div class="stat-pill">Total <strong>${total}</strong></div>
       <div class="stat-pill">Por comprar <strong>${pending.length}</strong></div>
       <div class="stat-pill">Comprado <strong>${done.length}</strong></div>`
    : '';

  // Progress bar
  const pWrap = document.getElementById('shop-progress-wrap');
  const pFill = document.getElementById('shop-progress-fill');
  if (total) {
    pWrap.style.display = 'block';
    pFill.style.width = `${Math.round((done.length / total) * 100)}%`;
  } else {
    pWrap.style.display = 'none';
  }

  // Lists
  renderItemList('shop-list-pending', pending, 'shop');
  renderItemList('shop-list-done', done, 'shop');

  document.getElementById('shop-done-label').style.display = done.length ? 'block' : 'none';
}

function renderItemList(elId, items, type) {
  const ul = document.getElementById(elId);
  if (!items.length) {
    ul.innerHTML = type === 'shop' && elId.includes('pending')
      ? `<li class="empty-state">Lista vacía — añade algo arriba 🛒</li>`
      : '';
    return;
  }
  const isDoneList = elId.includes('done');
  ul.innerHTML = items.map(item => `
    <li class="item-row ${item.status === 'done' ? 'done' : ''}">
      <button class="check-btn" onclick="toggle${capitalize(type)}Item(${item.id})" title="Marcar">✓</button>
      <span class="item-name">${escHtml(item.name)}</span>
      ${item.qty ? `<span class="item-qty">${escHtml(item.qty)}</span>` : ''}
      ${isDoneList && type === 'shop' ? `<button class="spent-btn" onclick="spendShopItem(${item.id})" title="Marcar como gastado">🍳 Gastado</button>` : ''}
      <button class="delete-btn" onclick="delete${capitalize(type)}Item(${item.id})" title="Eliminar">✕</button>
    </li>
  `).join('');
}

// ─── Fridge / Freezer ──────────────────────────────
function addFridgeItem(section) {
  const input = document.getElementById(`${section}-input`);
  const qty   = document.getElementById(`${section}-qty`);
  const name  = input.value.trim();
  if (!name) return;
  state[section].push({ id: Date.now(), name, qty: qty.value.trim() || '' });
  input.value = '';
  qty.value = '';
  save();
  renderFridge();
  input.focus();
}

function deleteFridgeItem(id) {
  state.fridge = state.fridge.filter(i => i.id !== id);
  state.freezer = state.freezer.filter(i => i.id !== id);
  save();
  renderFridge();
}

// dummy toggles for template (fridge items don't need toggle but we need the function)
function toggleFridgeItem() {}

function renderFridge() {
  ['fridge', 'freezer'].forEach(section => {
    const ul = document.getElementById(`${section}-list`);
    const items = state[section];
    if (!items.length) {
      ul.innerHTML = `<li style="color:var(--text-dim);font-size:0.82rem;padding:8px 4px;">Sin items aún</li>`;
      return;
    }
    ul.innerHTML = items.map(item => `
      <li class="item-row fridge-item-row">
        <span class="item-name" style="flex:1">${escHtml(item.name)}</span>
        ${item.qty ? `<span class="item-qty">${escHtml(item.qty)}</span>` : ''}
        <button class="delete-btn" onclick="deleteFridgeItem(${item.id})" title="Eliminar">✕</button>
      </li>
    `).join('');
  });
}

// ─── Recipes ────────────────────────────────────────
async function getRecipes(source) {
  let items = [];
  let context = source;

  if (source === 'shop') {
    items = state.shop.filter(i => i.status === 'done').map(i => i.name);
    if (!items.length) items = state.shop.map(i => i.name);
  } else {
    items = [...state.fridge.map(i => i.name), ...state.freezer.map(i => i.name)];
  }

  if (!items.length) {
    const outputEl = document.getElementById(`${source}-recipes-output`);
    outputEl.innerHTML = `<div class="error-msg">Añade algunos productos primero para obtener sugerencias.</div>`;
    return;
  }

  const btn = document.getElementById(`${source}-recipe-btn`);
  const outputEl = document.getElementById(`${source}-recipes-output`);

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Generando recetas...`;
  outputEl.innerHTML = '';

  try {
    const res = await fetch('/api/recipes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items, context })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      outputEl.innerHTML = `<div class="error-msg">⚠️ ${data.error || 'Error desconocido'}</div>`;
    } else {
      renderRecipes(outputEl, data.recipes);
    }
  } catch (e) {
    outputEl.innerHTML = `<div class="error-msg">⚠️ Error de conexión: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = source === 'shop'
      ? '✨ Sugerir recetas para la semana'
      : '🍳 Sugerir recetas con mi inventario';
  }
}

function renderRecipes(container, recipes) {
  if (!recipes || !recipes.length) {
    container.innerHTML = `<div class="error-msg">No se encontraron recetas. Intenta de nuevo.</div>`;
    return;
  }

  const diffClass = d => {
    const map = { fácil: 'easy', facil: 'easy', media: 'medium', difícil: 'hard', dificil: 'hard' };
    return map[d?.toLowerCase()] || 'easy';
  };

  const googleUrl = (query) =>
    `https://www.google.com/search?q=${encodeURIComponent((query || '') + ' receta')}`;

  container.innerHTML = `
    <div class="recipes-title">🍽️ Recetas sugeridas para esta semana</div>
    <div class="recipe-cards">
      ${recipes.map(r => `
        <div class="recipe-card">
          <div class="recipe-card-name">${escHtml(r.name)}</div>
          <div class="recipe-meta">
            <span class="recipe-tag tag-time">⏱ ${escHtml(r.time || '—')}</span>
            <span class="recipe-tag tag-${diffClass(r.difficulty)}">${escHtml(r.difficulty || '—')}</span>
          </div>
          <div class="recipe-desc">${escHtml(r.description)}</div>
          <a class="recipe-link" href="${googleUrl(r.search_query || r.name)}" target="_blank" rel="noopener">
            Ver receta completa →
          </a>
        </div>
      `).join('')}
    </div>
  `;
}

// ─── Utils ──────────────────────────────────────────
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ─── Init ────────────────────────────────────────────
renderShop();
renderFridge();
</script>
</body>
</html>
